<!DOCTYPE html>
<html>
<head>
  <title>Stock Analyzer</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family:Arial; padding:20px;">

<h1>Stock Analyzer</h1>

<input id="search" placeholder="Nome / ticker / ISIN">
<button onclick="search()">Search</button>

<h2 id="title"></h2>

<canvas id="chart"></canvas>

<div id="stats"></div>

<script>

async function search() {
  const q = document.getElementById("search").value;

  const res = await fetch(
    "https://backend-keo9.onrender.com/api/search?q=" + q
  );

  const data = await res.json();

  document.getElementById("title").innerText = data.ticker;

  const dates = data.timestamps.map(t =>
    new Date(t * 1000).toLocaleDateString()
  );

  new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels: dates,
      datasets: [{
        label: data.ticker,
        data: data.prices
      }]
    }
  });

  document.getElementById("stats").innerHTML = `
    Max: ${data.stats.max.toFixed(2)}<br>
    Min: ${data.stats.min.toFixed(2)}<br>
    Avg: ${data.stats.avg.toFixed(2)}<br>
    Current: ${data.stats.current.toFixed(2)}
  `;
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Stock Analyzer</title>

  <!-- ✅ FIX CHART.JS -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f5f7fa;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 15px;
      margin-top: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    input {
      padding: 10px;
    }

    button {
      padding: 10px;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    a {
      color: #0078d4;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<div class="container">

<h1>Stock Analyzer</h1>

<input id="searchInput" placeholder="MSFT">
<button onclick="searchStock()">Search</button>

<h2 id="title"></h2>

<canvas id="chart"></canvas>

<div class="card" id="stats"></div>
<div class="card" id="fundamentals"></div>
<div class="card" id="news"></div>

</div>

<script>

let chart = null;

async function searchStock() {

  const q = document.getElementById("searchInput").value;

  if (!q) return alert("Inserisci un ticker");

  const res = await fetch(
    "https://backend-keo9.onrender.com/api/search?q=" + q
  );

  const data = await res.json();

  if (data.error) {
    alert(data.error);
    return;
  }

  document.getElementById("title").innerText = data.ticker;

  const labels = (data.timestamps || []).map(t =>
    new Date(t * 1000).toLocaleDateString()
  );

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: data.ticker,
        data: data.prices || [],
        borderColor: "blue"
      }]
    }
  });

  // ✅ STATS
  document.getElementById("stats").innerHTML =
    "<h3>Price Stats</h3>" +
    "Max: " + (data.stats?.max?.toFixed(2) || "N/D") + "<br>" +
    "Min: " + (data.stats?.min?.toFixed(2) || "N/D") + "<br>" +
    "Avg: " + (data.stats?.avg?.toFixed(2) || "N/D") + "<br>" +
    "Current: " + (data.stats?.current?.toFixed(2) || "N/D");

  // ✅ FUNDAMENTALS
  document.getElementById("fundamentals").innerHTML =
    "<h3>Fundamentals</h3>" +
    "P/E: " + (data.info?.pe ?? "N/D") + "<br>" +
    "EPS: " + (data.info?.eps ?? "N/D") + "<br>" +
    "Beta: " + (data.info?.beta ?? "N/D");

  // ✅ NEWS
  let html = "<h3>News</h3>";

  if (data.news && data.news.length > 0) {
    data.news.forEach(n => {
      html += `<p><a href="${n.link}" target="_blank{
    html += "Nessuna news disponibile";
  }

  document.getElementById("news").innerHTML = html;
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Stock Analyzer</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f5f7fa;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .container {
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    input {
      padding: 10px;
      width: 250px;
    }

    button {
      padding: 10px;
      margin-left: 10px;
      cursor: pointer;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 5px;
    }

    a {
      text-decoration: none;
      color: #0078d4;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<div class="container">

<h1>Stock Analyzer</h1>

<input id="search" placeholder="Nome o ticker (es: MSFT)">
<button onclick="search()">Search</button>

<h2 id="title"></h2>

<canvas id="chart"></canvas>

<div class="card" id="stats"></div>
<div class="card" id="fundamentals"></div>
<div class="card" id="news"></div>

</div>

<script>
let chart;

function format(n) {
  return n ? n.toFixed(2) : "N/D";
}

async function search() {
  const q = document.getElementById("search").value;

  const res = await fetch(
    "https://backend-keo9.onrender.com/api/search?q=" + q
  );

  const data = await res.json();

  document.getElementById("title").innerText = data.ticker;

  const dates = (data.timestamps || []).map(t =>
    new Date(t * 1000).toLocaleDateString()
  );

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels: dates,
      datasets: [{
        label: data.ticker,
        data: data.prices,
        borderColor: "blue"
      }]
    }
  });

  // stats
  document.getElementById("stats").innerHTML = `
    <h3>Price Stats</h3>
    Max: ${format(data.stats?.max)}<br>
    Min: ${format(data.stats?.min)}<br>
    Avg: ${format(data.stats?.avg)}<br>
    Current: ${format(data.stats?.current)}
  `;

  // fundamentals
  document.getElementById("fundamentals").innerHTML = `
    <h3>Fundamentals</h3>
    P/E: ${data.info.pe ?? "N/D"}<br>
    EPS: ${data.info.eps ?? "N/D"}<br>
    Beta: ${data.info.beta ?? "N/D"}
  `;

  // news
  document.getElementById("news").innerHTML = `
    <h3>News</h3>
    ${data.news.map(n => `
      <p><a href="${n.link}"oin("")}
  `;
}
</script>

</body>
</html>

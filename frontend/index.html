<!DOCTYPE html>
<html>
<head>
  <title>Stock Analyzer</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family: Arial; padding: 20px;">

<h1>Stock Analyzer</h1>

<input id="search" placeholder="Nome o ticker (es: MSFT)">
<button onclick="search()">Search</button>

<h2 id="title"></h2>

<canvas id="chart" width="800" height="300"></canvas>

<div id="stats"></div>
<div id="company"></div>

<script>
let chart;

function formatNumber(n) {
  if (!n) return "N/D";

  if (n > 1e12) return (n/1e12).toFixed(2) + " T";
  if (n > 1e9) return (n/1e9).toFixed(2) + " B";

  return n.toFixed(2);
}

async function search() {

  const q = document.getElementById("search").value;

  const res = await fetch(
    "https://backend-keo9.onrender.com/api/search?q=" + q
  );

  const data = await res.json();

  document.getElementById("title").innerText = data.ticker;

  const dates = (data.timestamps || []).map(t =>
    new Date(t * 1000).toLocaleDateString()
  );

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels: dates,
      datasets: [{
        label: data.ticker,
        data: data.prices || [],
        borderColor: "blue"
      }]
    }
  });

  // ✅ stats
  document.getElementById("stats").innerHTML = `
    <h3>Price Stats</h3>
    Max: ${data.stats?.max?.toFixed(2) ?? "N/D"}<br>
    Min: ${data.stats?.min?.toFixed(2) ?? "N/D"}<br>
    Media: ${data.stats?.avg?.toFixed(2) ?? "N/D"}<br>
    Attuale: ${data.stats?.current?.toFixed(2) ?? "N/D"}
  `;

  // ✅ fundamentals migliorati
  document.getElementById("company").innerHTML = `
    <h3>Company</h3>

    Market Cap: ${formatNumber(data.meta.marketCap)}<br>
    Exchange: ${data.meta.exchange || "N/D"}<br>
    Currency: ${data.meta.currency || "N/D"}<br><br>

    P/E: ${data.info.pe ?? "N/D"}<br>
    EPS: ${data.info.eps ?? "N/D"}<br>
    Beta: ${data.info.beta ?? "N/D"}
  `;
}
</script>

</body>
</html>

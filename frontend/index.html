<!DOCTYPE html>
<html>
<head>
  <title>Stock Analyzer</title>
  https://cdn.jsdelivr.net/npm/chart.jsscript>
</head>

<body style="font-family: Arial; padding: 20px;">

<h1>Stock Analyzer</h1>

<input id="search" placeholder="Nome / ticker (es: MSFT)">
<button onclick="search()">Search</button>

<h2 id="title"></h2>

<canvas id="chart" width="800" height="300"></canvas>

<div id="stats"></div>
<div id="company"></div>

<script>
let chart;

async function search() {

  const q = document.getElementById("search").value;

  const res = await fetch(
    "https://backend-keo9.onrender.com/api/search?q=" + q
  );

  const data = await res.json();

  if (data.error) {
    alert(data.error);
    return;
  }

  document.getElementById("title").innerText = data.ticker;

  const dates = data.timestamps.map(t =>
    new Date(t * 1000).toLocaleDateString()
  );

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels: dates,
      datasets: [{
        label: data.ticker,
        data: data.prices,
        borderColor: "blue"
      }]
    }
  });

  document.getElementById("stats").innerHTML = `
    <h3>Price Stats</h3>
    Max: ${data.stats?.max?.toFixed(2) ?? "N/D"}<br>
    Min: ${data.stats?.min?.toFixed(2) ?? "N/D"}<br>
    Media: ${data.stats?.avg?.toFixed(2) ?? "N/D"}<br>
    Attuale: ${data.stats?.current?.toFixed(2) ?? "N/D"}
  `;

  document.getElementById("company").innerHTML = `
    <h3>Fundamentals</h3>
    P/E: ${data.info.pe ?? "N/D"}<br>
    EPS: ${data.info.eps ?? "N/D"}<br>
    Beta: ${data.info.beta ?? "N/D"}
  `;
}
</script>

</body>
</html>

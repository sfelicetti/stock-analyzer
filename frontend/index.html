<!DOCTYPE html>
<html>
<head>
  <title>Stock Analyzer</title>

  <!-- ✅ FIX CRITICO -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f5f7fa;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 15px;
      margin-top: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    button {
      padding: 8px 12px;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    input {
      padding: 8px;
    }

    a {
      color: #0078d4;
    }
  </style>
</head>

<body>
<div class="container">

<h1>Stock Analyzer</h1>

<input id="search" placeholder="MSFT">
<button onclick="runSearch()">Search</button>

<h2 id="title"></h2>

<canvas id="chart"></canvas>

<div class="card" id="stats"></div>
<div class="card" id="fundamentals"></div>
<div class="card" id="news"></div>

</div>

<script>
let chart;

// ✅ rinominata funzione (fix errore search())
async function runSearch() {

  const q = document.getElementById("search").value;

  const res = await fetch(
    "https://backend-keo9.onrender.com/api/search?q=" + q
  );

  const data = await res.json();

  document.getElementById("title").innerText = data.ticker;

  const labels = data.timestamps.map(t =>
    new Date(t * 1000).toLocaleDateString()
  );

  // grafico
  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        data: data.prices,
        borderColor: "blue",
        label: data.ticker
      }]
    }
  });

  // ✅ stats
  document.getElementById("stats").innerHTML =
    "<h3>Price Stats</h3>" +
    "Max: " + (data.stats?.max?.toFixed(2) || "N/D") + "<br>" +
    "Min: " + (data.stats?.min?.toFixed(2) || "N/D") + "<br>" +
    "Avg: " + (data.stats?.avg?.toFixed(2) || "N/D") + "<br>" +
    "Current: " + (data.stats?.current?.toFixed(2) || "N/D");

  // ✅ fundamentals
  document.getElementById("fundamentals").innerHTML =
    "<h3>Fundamentals</h3>" +
    "P/E: " + (data.info.pe ?? "N/D") + "<br>" +
    "EPS: " + (data.info.eps ?? "N/D") + "<br>" +
    "Beta: " + (data.info.beta ?? "N/D");

  // ✅ news (fix HTML)
  let newsHTML = "<h3>News</h3>";

  if (data.news && data.news.length > 0) {
    data.news.forEach(n => {
      newsHTML += `<p><a href="${n.link}"lse {
    newsHTML += "Nessuna news disponibile";
  }

  document.getElementById("news").innerHTML = newsHTML;
}
</script>

</body>
</html>
